<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Usuario | CoffeeSoft 1592</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../utils/styles-base.css">
    <style>
        body { background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; }
        .modal-card {
            background: var(--bg-card);
            border: 1px solid var(--border-base);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,.5);
        }
    </style>
</head>
<body>

    <div class="modal-card">
        <div class="p-6 text-center">

            <div class="w-14 h-14 mx-auto rounded-full bg-red-500/15 flex items-center justify-center mb-4">
                <svg class="w-7 h-7 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>

            <h2 class="text-base font-bold text-primary">Eliminar usuario</h2>
            <p class="text-[12px] text-secondary mt-2 px-4">
                Estas seguro de eliminar a <span class="text-primary font-medium">Juan Doe Hernandez</span>?
                Esta accion no se puede deshacer y se perderan todos sus datos.
            </p>
        </div>

        <div class="px-6 pb-6 flex items-center gap-2">
            <button class="btn-secondary flex-1" onclick="window.close()">Cancelar</button>
            <button class="flex-1 px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white text-[12px] font-medium" onclick="window.close()">
                Eliminar
            </button>
        </div>
    </div>

    <script src="../../utils/theme-toggle.js"></script>
</body>
</html>
